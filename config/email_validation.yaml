# Validation pipeline settings
validation:
  # Timeouts for external checks (seconds)
  mx_check_timeout: 10
  smtp_check_timeout: 15

  # Concurrency limits
  max_concurrent_mx_checks: 20
  max_concurrent_smtp_checks: 5

  # Retry configuration for DNS/network errors
  retry_on_dns_error: true
  max_retries: 2
  retry_delay_seconds: 3

  # Quality classification thresholds
  quality_rules:
    # Emails that pass all checks
    high:
      - valid_format
      - not_disposable
      - not_role_based
      - has_mx
    # Emails that fail MX or have DNS errors
    medium:
      - valid_format
      - not_disposable
      - dns_error_or_no_mx
    # Disposable or role-based emails
    low:
      - disposable_domain
      - role_based_prefix

# External verification API configuration
# API keys are loaded from environment variables:
#   HUNTER_API_KEY, ZEROBOUNCE_API_KEY, MILLIONVERIFIER_API_KEY
external_verification:
  enabled: true
  providers:
    - name: hunter
      env_key: HUNTER_API_KEY
      priority: 1
      monthly_limit: 25
    - name: zerobounce
      env_key: ZEROBOUNCE_API_KEY
      priority: 2
      monthly_limit: 100
    - name: millionverifier
      env_key: MILLIONVERIFIER_API_KEY
      priority: 3
      monthly_limit: 200
