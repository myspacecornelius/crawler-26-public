# ──────────────────────────────────────────────────
#  CRAWL — Target Site Definitions
#  Each entry defines a scraping target with its
#  URL, adapter class, CSS selectors, and pagination.
# ──────────────────────────────────────────────────

sites:
  openvc:
    enabled: true
    url: "https://www.openvc.app/"
    adapter: "openvc"
    description: "Open investor directory — no login required"
    selectors:
      card: "#tableCont table tbody tr"
      name: ".nameCell #invOverflow"
      email: ""
      role: ".nameCell a.VClink div:not(#invOverflow)"
      fund: ".nameCell a.VClink"
      focus_areas: "td[data-label='Targeted industries']"
      stage: "td[data-label='Funding stages']"
      check_size: "td[data-label='Check size']"
      location: "td[data-label='Target countries']"
      linkedin: ""
      website: ""
    pagination:
      type: "infinite_scroll"
      scroll_count: 500
      scroll_delay_ms: 1200
      extract_interval: 3
      load_indicator: ".loading-spinner"

  angelmatch:
    enabled: true
    url: "https://angelmatch.io/investors"
    adapter: "angelmatch"
    description: "Angel investor matching platform — freemium"
    selectors:
      card: ".investor-card, [class*='investor'] > div, table tbody tr, div[class*='Card'], div[class*='card']"
      name: "h3, h2, .investor-name, td:nth-child(1) a, [class*='name'], [class*='Name']"
      email: ""
      role: ".investor-type, td:nth-child(2), [class*='type'], [class*='role']"
      fund: ""
      focus_areas: ".investor-tags span, .tags span, td:nth-child(4) span, [class*='tag'], [class*='industry']"
      stage: ""
      check_size: ""
      location: ".investor-location, td:nth-child(3), [class*='location'], [class*='Location']"
      linkedin: "a[href*='linkedin.com/in/']"
      website: "a[href*='http']:not([href*='angelmatch']):not([href*='linkedin']):not([href*='twitter']):not([href*='/pricing'])"
    pagination:
      type: "load_more_button"
      button_selector: "button[class*='load'], button[class*='more'], button[class*='Load'], a[class*='load'], [class*='pagination'] button, button:has-text('Load More'), button:has-text('Show More')"
      max_clicks: 300
      click_delay_ms: 1500

  visible_vc:
    enabled: false # DISABLED: visible.vc/investors now redirects to visible.vc/monitor/ (product page).
    # The investor database moved to connect.visible.vc/investors which requires login.
    # URL updated to reflect current redirect destination; re-enable only if public access is confirmed.
    url: "https://connect.visible.vc/investors"
    adapter: "visible_vc"
    description: "Visible Connect — investor database (requires login as of 2026)"
    selectors:
      # connect.visible.vc renders via React; selectors based on observed component patterns
      card: "[data-testid='investor-card'], .investor-card, [class*='InvestorCard'], [class*='investor-card']"
      name: "[data-testid='investor-name'], .investor-name, h3, [class*='InvestorName']"
      email: ""
      role: "[data-testid='investor-title'], .investor-title, [class*='InvestorTitle'], .title"
      fund: "[data-testid='fund-name'], .fund-name, .firm-name, [class*='FundName']"
      focus_areas: "[data-testid='focus-area'], .focus-tag, .tag, [class*='tag']"
      stage: "[data-testid='stage'], .stage, [class*='Stage']"
      check_size: "[data-testid='check-size'], .check-size, [class*='CheckSize']"
      location: "[data-testid='location'], .location, [class*='Location']"
      linkedin: "a[href*='linkedin.com/in/']"
      website: "a[href*='http']:not([href*='linkedin']):not([href*='visible.vc'])"
    pagination:
      type: "load_more_button"
      button_selector: "button[data-testid='load-more'], button.load-more, [class*='LoadMore'] button"
      max_clicks: 50
      click_delay_ms: 2000

  landscape_vc:
    enabled: false # DISABLED: landscape.vc/investors returns 404 as of 2026-03.
    # The /investors path no longer exists on landscape.vc (it's a VC news/analysis site).
    # URL updated to the site root for re-evaluation; do not enable until a valid directory path is found.
    url: "https://landscape.vc"
    adapter: "landscape_vc"
    description: "Landscape.vc — VC news site; investor directory path (/investors) returns 404"
    selectors:
      # Selectors below are best-guess for any investor list pages that may exist under the site.
      # landscape.vc appears to be a Next.js/React site; these selectors target common patterns.
      card: "article, .investor-card, [class*='InvestorCard'], [class*='card'], li[class*='investor']"
      name: "h2, h3, .name, [class*='name'], [class*='Name']"
      email: "a[href^='mailto:']"
      role: ".title, .role, [class*='title'], [class*='Title']"
      fund: ".firm, .fund, [class*='firm'], [class*='fund']"
      focus_areas: ".sectors span, .focus span, [class*='sector'], [class*='tag']"
      stage: ".stage, [class*='stage']"
      check_size: ".check, [class*='check']"
      location: ".location, [class*='location']"
      linkedin: "a[href*='linkedin.com/in/']"
      website: "a[href*='http']:not([href*='landscape.vc']):not([href*='linkedin'])"
    pagination:
      type: "numbered_pages"
      next_button: "a[rel='next'], .pagination .next, button.next-page, [aria-label='Next page']"
      max_pages: 50

  wellfound:
    enabled: false # DISABLED: requires login, 0 cards in test run
    url: "https://wellfound.com/investors"
    adapter: "wellfound"
    description: "Wellfound (AngelList) — large angel/VC investor database"
    selectors:
      card: "[data-test='InvestorRow'], .investor-row, .styles_component__"
      name: "[data-test='InvestorName'], .investor-name, h3"
      email: ""
      role: "[data-test='InvestorTitle'], .investor-title"
      fund: "[data-test='InvestorFirm'], .investor-firm"
      focus_areas: "[data-test='InvestorMarkets'] span, .market-tags .tag"
      stage: "[data-test='InvestorStage'], .stage-tag"
      check_size: "[data-test='InvestorCheckSize'], .check-size"
      location: "[data-test='InvestorLocation'], .location"
      linkedin: "a[href*='linkedin.com/in/']"
      website: "a[href*='http']:not([href*='wellfound']):not([href*='linkedin'])"
    pagination:
      type: "infinite_scroll"
      scroll_count: 80
      scroll_delay_ms: 1500
      load_indicator: ".loading, [data-test='loading']"

  signal_nfx:
    enabled: true # React SPA — requires Playwright (already supported). Selectors updated for rendered DOM.
    url: "https://signal.nfx.com/investor-lists"
    adapter: "signal_nfx"
    description: "NFX Signal — high-quality VC directory. React SPA, fully JS-rendered via Playwright."
    selectors:
      # signal.nfx.com renders investor cards client-side via React.
      # The JS bundle chunk is named vc_lists-vc_list_routes, confirming a list-view route.
      # Selectors target the rendered output based on NFX's known component patterns.
      card: "[class*='InvestorCard'], [class*='investor-card'], [class*='InvestorRow'], [class*='investor-row'], [class*='SignalCard']"
      name: "[class*='InvestorName'], [class*='investor-name'], h3, h2, [class*='name']"
      email: ""
      role: "[class*='InvestorTitle'], [class*='investor-title'], [class*='title'], [class*='position']"
      fund: "[class*='OrgName'], [class*='org-name'], [class*='FirmName'], [class*='firm-name'], [class*='fund']"
      focus_areas: "[class*='SectorTag'], [class*='sector-tag'], [class*='FocusTag'], [class*='Tag'], [class*='tag']:not([class*='stage'])"
      stage: "[class*='StageTag'], [class*='stage-tag'], [class*='Stage']"
      check_size: ""
      location: "[class*='Location'], [class*='location'], [class*='City'], [class*='city']"
      linkedin: "a[href*='linkedin.com/in']"
      website: "a[href*='http']:not([href*='linkedin']):not([href*='signal.nfx']):not([href*='nfx.com'])"
    pagination:
      type: "load_more_button"
      # Signal uses a "Load More" or infinite scroll pattern for its investor list
      button_selector: "button[class*='load-more'], button[class*='LoadMore'], button:has-text('Load More'), button:has-text('Show More'), [class*='load-more'] button"
      max_clicks: 150
      click_delay_ms: 2500

  crunchbase:
    enabled: true
    url: "https://www.crunchbase.com/discover/organization.investors"
    adapter: "crunchbase"
    description: "Crunchbase — free tier org/person pages for investor data"
    selectors:
      card: ".component--grid-row, [class*='GridRow'], tr[data-entity]"
      name: ".person-name, .identifier-label, h3"
      email: ""
      role: ".person-title, .role, .title"
      fund: ".organization-name, .org-link, .company"
      focus_areas: ".category-tag, .industry-tag"
      stage: ""
      check_size: ""
      location: ".location, .headquarters"
      linkedin: "a[href*='linkedin.com/in']"
      website: "a[class*='homepage'], a[href*='http']:not([href*='crunchbase']):not([href*='linkedin'])"
    pagination:
      type: "numbered_pages"
      next_button: "a[rel='next'], button.next-page, [class*='pagination'] a:last-child"
      max_pages: 100

# ──────────────────────────────────────────────────
#  Global Defaults
# ──────────────────────────────────────────────────
defaults:
  timeout_ms: 60000
  initial_wait_ms: 5000
  headless: false
  screenshots: true
  screenshot_dir: "data/screenshots"
