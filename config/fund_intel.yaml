# Investment verb patterns for news/blog extraction
investment_verbs:
  - invested
  - led
  - co-led
  - participated
  - backed
  - announced
  - closed
  - raised
  - funded
  - seed round
  - series
  - joined
  - "led the"
  - "co-invested"
  - "invested in"
  - "portfolio company"

# Lead/follow evidence phrases
lead_evidence:
  lead: ["we lead", "lead investor", "led seed", "led the round", "lead rounds", "we typically lead", "led series", "lead or co-lead", "board seat", "we take board"]
  follow: ["we participate", "participated in", "co-invested", "follow-on", "syndicate", "we join", "alongside"]
